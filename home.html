        /* 麦克风按钮 */

            width: 44px;
            height: 44px;
            border-radius: 50%;

            color: #1e3a6b;

            margin-right: 4px;
            transition: all 0.2s;
            position: relative;
        }
        .mic-btn:hover {
            background: #dce8f7;
        }
        .mic-btn.recording {
            background: #ff4757;
            color: white;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .mic-btn.recording::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 71, 87, 0.3);
            transform: translate(-50%, -50%);
            animation: ripple 1.5s ease-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes ripple {
            0% { width: 44px; height: 44px; opacity: 0.6; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }
        .input-wrapper button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #1e3e70;
            color: white;

        .quick-row {

        .toast-msg {

        .modal-overlay {

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 新建对话功能
        document.getElementById('newChatBtn').addEventListener('click', function() {
            const messageFlow = document.getElementById('messageFlow');
            if (messageFlow) {
                messageFlow.innerHTML = '';
            }
            const input = document.getElementById('questionInput');
            if (input) {
                input.value = '';
            }
            showToast('已新建对话');
        });

        // 麦克风语音输入功能
        const micBtn = document.getElementById('micBtn');
        const questionInput = document.getElementById('questionInput');
        let recognition = null;
        let isRecording = false;

        micBtn.addEventListener('click', function() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                showToast('您的浏览器不支持语音识别');
                return;
            }

            if (isRecording) {
                // 停止录音
                recognition.stop();
                isRecording = false;
                micBtn.classList.remove('recording');
                showToast('语音输入已停止');
            } else {
                // 开始录音
                recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.continuous = false;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';

                recognition.onstart = function() {
                    isRecording = true;
                    micBtn.classList.add('recording');
                    showToast('正在听，请说话...');
                };

                recognition.onresult = function(event) {
                    let transcript = '';
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        transcript += event.results[i][0].transcript;
                    }
                    questionInput.value = transcript;
                };

                recognition.onerror = function(event) {
                    isRecording = false;
                    micBtn.classList.remove('recording');
                    if (event.error === 'not-allowed') {
                        showToast('请允许麦克风权限');
                    } else {
                        showToast('语音识别出错: ' + event.error);
                    }
                };

                recognition.onend = function() {
                    if (isRecording) {
                        // 自动结束
                        isRecording = false;
                        micBtn.classList.remove('recording');
                        showToast('语音输入已结束');
                    }
                };

                recognition.start();
            }
        });
    });

    // ======================= MOCK 数据区域 =======================
    
    // 1. 历史会话记录 (mock)
    let historyRecords = [

        { q: "风险等级分布" },
        { q: "客户持仓总金额排名" }
    ];
    
    let currentActive = "赵司的总持仓是多少？固收和权益占比？";   // 默认高亮第一项历史

    function escapeHtml(s){ return String(s).replace(/[&<>]/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        }
        if(lower.includes('持仓规模超过1000万') || lower.includes('持仓超过1000万')) {
            return { type:'table', title:'💰 持仓规模超过1000万的客户', columns:['客户名称','持仓总规模(万元)','产品数量'], rows:[['赵司','1260','4'],['林德福','1520','5'],['周裕华','1100','3']], summary:'共3位客户持仓超千万', thinking:{ userQuestion:'哪些客户持仓规模超过1000万？', systemUnderstanding:{time:'无', dimension:'客户名称', metric:'持仓金额（求和）', filter:'持仓>1000万'}, confidence:'92%（高）', confidenceReason:'查询条件明确，过滤阈值清晰', dataSource:'持仓表', fieldMapping:{cust_name:'客户名称', amount:'持仓金额（求和）'}, dataUpdateTime:'2026-05-09 08:00', executionSummary:'查询执行成功，耗时180ms，返回3行数据', chartRecommendation:'表格', chartReason:'您查询的是高净值客户列表，需要展示每位客户的具体持仓金额，表格能准确呈现数值对比' }, suggestions:['这些客户的详细持仓明细是什么','能为他们推荐新产品吗','请分析客户资产配置偏好'] };
        }
        if(lower.includes('风险等级分布') || lower.includes('风险分布')) {
            return { type:'pie', title:'📊 客户风险等级分布', data:{'C1保守型':8,'C2稳健型':24,'C3平衡型':35,'C4进取型':28,'C5激进型':15}, summary:'C3及以上客户占比78%', thinking:{ userQuestion:'客户风险等级是如何分布的？', systemUnderstanding:{time:'无', dimension:'风险等级', metric:'客户数量（计数）', filter:'无'}, confidence:'98%（高）', confidenceReason:'统计维度明确，无歧义', dataSource:'客户表', fieldMapping:{risk_level:'风险等级（分组）', count:'客户数量（计数）'}, dataUpdateTime:'2026-05-09 08:00', executionSummary:'查询执行成功，耗时95ms，返回5行数据', chartRecommendation:'饼图', chartReason:'您查询的是各风险等级的占比分布，饼图能直观呈现不同等级的占比关系' }, suggestions:['各风险等级适合推荐什么产品','想看高风险客户的详细名单','请分析风险等级变化趋势'] };
        }
        if(lower.includes('客户持仓总金额排名') || lower.includes('持仓金额排名')) {
            return { type:'bar', title:'🏆 客户持仓总金额排名 (万元)', labels:['赵司','林德福','周裕华','陈国富','孙立人'], values:[1260,1520,1100,980,870], summary:'林德福客户持仓总金额最高', thinking:{ userQuestion:'客户持仓金额排名是怎样的？', systemUnderstanding:{time:'无', dimension:'客户名称', metric:'持仓金额（求和）', filter:'Top5'}, confidence:'96%（高）', confidenceReason:'排名查询意图明确，排序条件清晰', dataSource:'持仓表', fieldMapping:{cust_name:'客户名称（分组）', amount:'持仓金额（求和）'}, dataUpdateTime:'2026-05-09 08:00', executionSummary:'查询执行成功，耗时210ms，返回5行数据', chartRecommendation:'柱状图', chartReason:'您查询的是各客户持仓金额排名，柱状图能清晰对比不同客户的金额大小' }, suggestions:['请分析前两名客户的差距原因','能查看更多排名吗','流失预警可以说明一下吗'] };
        }
        return { type:'text', title:'📌 查询结果', content:`✅ 赵司总持仓 ¥1,260 万，其中固收类 880 万 (69.8%)，权益类 380 万 (30.2%)。`, summary:'数据截止今日', thinking:{ userQuestion:'赵司的持仓金额和类型分布是多少？', systemUnderstanding:{time:'无', dimension:'资产类型', metric:'持仓金额（求和）', filter:'客户=赵司'}, confidence:'94%（高）', confidenceReason:'客户明确，查询维度清晰', dataSource:'持仓表', fieldMapping:{asset_type:'资产类型（分组）', amount:'持仓金额（求和）'}, dataUpdateTime:'2026-05-09 08:00', executionSummary:'查询执行成功，耗时150ms，返回2行数据', chartRecommendation:'饼图', chartReason:'您查询的是赵司的资产类型分布，饼图能直观展示固收类和权益类的占比关系' }, suggestions:['能帮我分析一下配置是否合理吗','想优化这个客户的资产配置','请预测持仓变化趋势'] };
    }

    function renderAnswerCard(ans, container, questionText){
        const timeStr = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        container.innerHTML = `<div class="message-time">${timeStr}</div>`;
        const stepsDiv = document.createElement('div'); stepsDiv.className='thinking-steps';
        const titleRow = document.createElement('div');
        titleRow.style.cssText = 'font-weight: 600; color: #1f4870; padding: 8px 18px; background: #edf4fe; border-radius: 18px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;';
        titleRow.innerHTML = '<span><i class="fas fa-chevron-down"></i> 思考过程</span><span id="toggleAllSteps" style="font-size: 12px; color: #3466a8;">展开</span>';
        stepsDiv.appendChild(titleRow);
        const stepsContent = document.createElement('div'); stepsContent.className='steps-content';
        stepsContent.style.display = 'none';
        stepsContent.innerHTML = `<div class="step"><div class="step-header" onclick="this.parentElement.classList.toggle('collapsed')"><i class="fas fa-chevron-right"></i> 意图识别</div><div class="step-content">
            <div style="margin-bottom:10px"><strong>您问：</strong>${ans.thinking.userQuestion}</div>
            <div style="margin-bottom:8px"><strong>系统理解：</strong></div>
            <div style="padding-left:20px; margin-bottom:8px">
                <div>• 时间：${ans.thinking.systemUnderstanding.time}</div>
                <div>• 查询维度：${ans.thinking.systemUnderstanding.dimension}</div>
                <div>• 查询指标：${ans.thinking.systemUnderstanding.metric}</div>
                <div>• 过滤条件：${ans.thinking.systemUnderstanding.filter}</div>
            </div>
            <div style="margin-bottom:8px"><strong>置信度：</strong>${ans.thinking.confidence}</div>
            <div>• 原因：${ans.thinking.confidenceReason}</div>
        </div></div>
        <div class="step"><div class="step-header" onclick="this.parentElement.classList.toggle('collapsed')"><i class="fas fa-chevron-right"></i> 语义映射</div><div class="step-content">
            <div style="margin-bottom:8px"><strong>匹配数据源：</strong>${ans.thinking.dataSource}</div>
            <div style="margin-bottom:8px"><strong>字段映射：</strong></div>
            <div style="padding-left:20px">
                ${Object.entries(ans.thinking.fieldMapping).map(([k, v]) => `<div>• ${k} → ${v}</div>`).join('')}
            </div>
            <div style="margin-top:8px"><strong>数据更新时间：</strong>${ans.thinking.dataUpdateTime}</div>
        </div></div>
        <div class="step"><div class="step-header" onclick="this.parentElement.classList.toggle('collapsed')"><i class="fas fa-chevron-right"></i> 规划执行</div><div class="step-content">
            <div>${ans.thinking.executionSummary}</div>
        </div></div>
        <div class="step"><div class="step-header" onclick="this.parentElement.classList.toggle('collapsed')"><i class="fas fa-chevron-right"></i> 可视化推荐</div><div class="step-content">
            <div style="margin-bottom:8px"><strong>推荐图表：</strong>${ans.thinking.chartRecommendation}</div>
            <div><strong>推荐理由：</strong>${ans.thinking.chartReason}</div>
        </div></div>`;
        stepsDiv.appendChild(stepsContent);
        container.appendChild(stepsDiv);
        
        const toggleBtn = document.getElementById('toggleAllSteps');
        let isExpanded = false;
        const toggleSteps = () => {
            isExpanded = !isExpanded;
            stepsContent.style.display = isExpanded ? 'block' : 'none';
            titleRow.querySelector('i').className = isExpanded ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
            toggleBtn.innerHTML = isExpanded ? '收起' : '展开';
        };
        toggleBtn.onclick = (e) => {
            e.stopPropagation();
            toggleSteps();
        };
        titleRow.onclick = toggleSteps;
        const titleDiv = document.createElement('div'); titleDiv.className='answer-text'; titleDiv.innerText=ans.title; container.appendChild(titleDiv);
        let contentElem;
        if(ans.type === 'table'){
            let tbl = document.createElement('table'); tbl.className='data-table';
            let thead = document.createElement('thead'); let tr = document.createElement('tr');
            ans.columns.forEach(c=>{let th=document.createElement('th'); th.innerText=c; tr.appendChild(th);});
            thead.appendChild(tr); tbl.appendChild(thead);
            let tbody = document.createElement('tbody');
            ans.rows.forEach(row=>{let r=document.createElement('tr'); row.forEach(cell=>{let td=document.createElement('td'); td.innerText=cell; r.appendChild(td);}); tbody.appendChild(r);});
            tbl.appendChild(tbody); contentElem=tbl;
        } else if(ans.type === 'pie'){
            let pieDiv = document.createElement('div'); let total = Object.values(ans.data).reduce((a,b)=>a+b,0); let stops=[], start=0, colors=['#2f69b0','#487fc7','#6190cf','#7da3db','#9bb9e8'];
            Object.entries(ans.data).forEach(([k,v],idx)=>{ let p=(v/total)*100; stops.push(`${colors[idx]} ${start}% ${start+p}%`); start+=p; });
            pieDiv.innerHTML = `<div style="display:flex; gap:20px; flex-wrap:wrap;"><div style="width:130px;height:130px;border-radius:50%;background:conic-gradient(${stops.join(',')});"></div><div>${Object.entries(ans.data).map(([k,v])=>`<div>${k}: ${v}人 (${((v/total)*100).toFixed(1)}%)</div>`).join('')}</div></div>`;
            contentElem=pieDiv;
        } else if(ans.type === 'bar'){
            let barDiv = document.createElement('div'); let maxVal = Math.max(...ans.values);
            barDiv.innerHTML = `<div class="bar-chart">${ans.labels.map((l,i)=>`<div class="bar-item"><div class="bar" style="height:${Math.max(25,(ans.values[i]/maxVal)*80)}px"></div><div>${ans.values[i]}w</div><div>${l}</div></div>`).join('')}</div>`;
            contentElem=barDiv;
        } else {
            let textDiv = document.createElement('div'); textDiv.innerText=ans.content; textDiv.style.padding='12px 0'; contentElem=textDiv;
        }
        container.appendChild(contentElem);
        let summary = document.createElement('div'); summary.style.cssText='font-size:13px; color:#4b6f94; margin-top:12px; border-top:1px solid #e2ecf8; padding-top:10px'; summary.innerText = `🔍 ${ans.summary} | 数据截止 ${new Date().toLocaleDateString()} | 本回答由 AI 生成，内容仅供参考，请仔细甄别`; container.appendChild(summary);
        
        if(ans.suggestions && ans.suggestions.length > 0){
            let suggestDiv = document.createElement('div'); suggestDiv.className='suggestions-area';
            suggestDiv.innerHTML = `<div class="suggestions-label"><i class="fas fa-lightbulb"></i> 如果需要，我可以进一步回答</div><div class="suggestions-list">${ans.suggestions.map(s => `<span class="suggestion-chip" onclick="handleSuggestionClick('${s.replace(/'/g, "\\'")}')">${s}</span>`).join('')}</div>`;
            container.appendChild(suggestDiv);
        }
        
        let feedback = document.createElement('div'); feedback.className='feedback-actions';
        const copyBtn = document.createElement('button'); copyBtn.className='feedback-item'; copyBtn.innerHTML='<i class="far fa-copy"></i> 复制答案';
        copyBtn.onclick = () => { let copyText = ans.title + '\n' + (ans.type==='table'? ans.rows.map(r=>r.join('\t')).join('\n'): ans.type==='pie'? Object.entries(ans.data).map(([k,v])=>`${k}: ${v}人`).join('\n'): ans.type==='bar'? ans.labels.map((l,i)=>`${l}: ${ans.values[i]}w`).join('\n'): ans.content); navigator.clipboard.writeText(copyText); showToast('已复制'); };
        const exportBtn = document.createElement('button'); exportBtn.className='feedback-item'; exportBtn.innerHTML='<i class="fas fa-file-excel"></i> 导出Excel';
        exportBtn.onclick = () => {
            let excelContent = `\uFEFF${ans.title}\n`;
            if(ans.type === 'table'){
                excelContent += ans.columns.join('\t') + '\n';
                ans.rows.forEach(row => excelContent += row.join('\t') + '\n');
            } else if(ans.type === 'pie'){
                Object.entries(ans.data).forEach(([k,v]) => excelContent += `${k}\t${v}\n`);
            } else if(ans.type === 'bar'){
                excelContent += '客户\t金额(万)\n';
                ans.labels.forEach((l,i) => excelContent += `${l}\t${ans.values[i]}\n`);
            } else {
                excelContent += ans.content.replace(/\n/g, '\r\n');
            }
            excelContent += `\n${ans.summary}`;
            const blob = new Blob([excelContent], { type: 'application/vnd.ms-excel;charset=utf-8' });
            const link = document.createElement('a');
            link.download = `问数结果.xls`;
            link.href = URL.createObjectURL(blob);
            link.click();
            URL.revokeObjectURL(link.href);
        };
        const like = document.createElement('button'); like.className='feedback-item'; like.innerHTML='<i class="far fa-thumbs-up"></i> 有用'; like.onclick=()=>showToast('感谢反馈');
        const dislike = document.createElement('button'); dislike.className='feedback-item'; dislike.innerHTML='<i class="far fa-thumbs-down"></i> 无用'; dislike.onclick=()=>showToast('已记录');
        const regen = document.createElement('button'); regen.className='feedback-item'; regen.innerHTML='<i class="fas fa-rotate-right"></i> 重新生成'; regen.onclick=()=>{ let newAns=generateFullAnswer(questionText); renderAnswerCard(newAns, container, questionText); };
        feedback.append(copyBtn, exportBtn, like, dislike, regen); container.appendChild(feedback);
    }

    // ========== 历史记录渲染与对话加载 ==========
    function renderHistory(){
        const container = document.getElementById('historyList');
        if(!container) return;
        if(historyRecords.length===0){ container.innerHTML='<div style="padding:20px;text-align:center;color:#aaa;">暂无历史</div>'; return; }
        container.innerHTML = historyRecords.map(rec => `<div class="history-item ${currentActive===rec.q?'active':''}" data-question="${escapeHtml(rec.q)}"><i class="fas fa-message"></i> <span>${rec.q.length>28?rec.q.substring(0,28)+'…':rec.q}</span></div>`).join('');
        document.querySelectorAll('.history-item').forEach(item=>{ item.addEventListener('click',()=>{ let q=item.getAttribute('data-question'); if(q) loadConversation(q); }); });
    }

    function loadConversation(question){
        const flow = document.getElementById('messageFlow');
        const now = new Date();
        const timeStr = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        // 添加用户气泡
        const userDiv = document.createElement('div'); userDiv.className='user-message-wrapper';
        userDiv.innerHTML = `<div class="message-time">${timeStr}</div><div class="user-message">${escapeHtml(question)}<div class="copy-question-icon" onclick="event.stopPropagation(); navigator.clipboard.writeText('${escapeHtml(question)}'); showToast('已复制问题');"><i class="far fa-copy"></i> 复制</div></div>`;
        flow.appendChild(userDiv);
        const botDiv = document.createElement('div'); botDiv.className='bot-response';
        botDiv.innerHTML = `<div class="message-time">${timeStr}</div>`;
        flow.appendChild(botDiv);
        const ans = generateFullAnswer(question);
        renderAnswerCard(ans, botDiv, question);
        flow.scrollTop = flow.scrollHeight;
        currentActive = question;
        renderHistory();
    }

    function handleSuggestionClick(suggestion){
        const input = document.getElementById('questionInput');
        if(input) input.value = suggestion;
        loadConversation(suggestion);
        showToast('已加载推荐问题');
    }

    // 页面启动时加载对话（优先从URL参数获取问题，否则使用默认问题）
    function initDefaultConversation() {
        const urlParams = new URLSearchParams(window.location.search);
        const questionFromUrl = urlParams.get('question');
        const defaultQuestion = questionFromUrl ? decodeURIComponent(questionFromUrl) : "赵司的总持仓是多少？固收和权益占比？";
        loadConversation(defaultQuestion);
    }

    // 事件绑定
    document.getElementById('sendBtn').addEventListener('click',()=>{ let q=document.getElementById('questionInput').value.trim(); if(q){ loadConversation(q); document.getElementById('questionInput').value=''; } });
    document.getElementById('questionInput').addEventListener('keypress',e=>{ if(e.key==='Enter') document.getElementById('sendBtn').click(); });
    document.getElementById('quick1').onclick=()=>loadConversation('查询本周过生日的客户');
    document.getElementById('quick2').onclick=()=>loadConversation('持仓规模超过1000万的客户');
    document.getElementById('quick3').onclick=()=>loadConversation('风险等级分布');
    document.getElementById('quick4').onclick=()=>loadConversation('客户持仓总金额排名');

    // 初始化渲染
    renderHistory();
    initDefaultConversation();   // 对话框自动展示原先mock问答
</script>
</body>
</html>
