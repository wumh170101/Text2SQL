<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信托智数 · 智能问数</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f5f7fa;
            min-height: 100vh;
        }
        .ai-container {
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .nav-header {
            padding: 16px 32px;
            background: white;
            border-bottom: 1px solid #eef2f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-placeholder {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #0f2b4d, #1f4a7a);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
        }
        .logo-text {
            display: none;
        }
        .avatar-icon {
            width: 44px;
            height: 44px;
            background: #2b5280;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffffff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: 55%;
            background-position: center 55%;
            background-repeat: no-repeat;
            transition: transform 0.1s;
        }
        .avatar-icon:hover {
            transform: scale(1.02);
            background-color: #1f4870;
        }
        .avatar-menu {
            position: absolute;
            top: 76px;
            right: 32px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.12);
            min-width: 160px;
            padding: 8px 0;
            display: none;
            z-index: 1000;
            border: 1px solid #eef2f9;
        }
        .avatar-menu.show {
            display: block;
        }
        .menu-item {
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: #333;
            font-size: 14px;
        }
        .menu-item:hover {
            background: #f5f7fa;
        }
        .menu-item i {
            width: 16px;
            color: #666;
        }
        .main-vertical {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .input-zone {
            padding: 24px 32px;
            background: white;
            flex-shrink: 0;
        }
        .greeting-area {
            margin-bottom: 16px;
        }
        .greeting-area h2 {
            font-size: 24px;
            font-weight: 600;
            color: #152c42;
        }
        .mode-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .mode-chip {
            padding: 8px 16px;
            border-radius: 20px;
            background: #f0f4f8;
            color: #4b6f94;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .mode-chip:hover {
            background: #e2eaf5;
        }
        .mode-chip.active {
            background: linear-gradient(135deg, #2b5280, #1f4a7a);
            color: white;
        }
        .ask-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 24px;
            padding: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .assistant-select {
            padding: 10px 14px;
            border: none;
            border-radius: 18px;
            background: #f0f4f8;
            color: #2b5280;
            font-size: 13px;
            cursor: pointer;
            outline: none;
            margin-right: 8px;
            border-right: 1px solid #e2eaf5;
        }
        #questionInput {
            flex: 1;
            padding: 12px 16px;
            border: none;
            outline: none;
            font-size: 14px;
            background: transparent;
        }
        .send-action {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2b5280, #1f4a7a);
            border: none;
            border-radius: 50%;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .send-action:hover {
            transform: scale(1.05);
        }
        .quick-hint {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .quick-tag {
            padding: 6px 12px;
            background: white;
            border-radius: 12px;
            font-size: 12px;
            color: #4b6f94;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
        }
        .quick-tag:hover {
            background: #f0f4f8;
            color: #2b5280;
        }
        .bottom-space {
            flex: 1;
            background: #f5f7fa;
        }
        .message-row {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .avatar-small {
            width: 32px;
            height: 32px;
            background: #eef2fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #2b659b;
            font-size: 15px;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .bubble {
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 70%;
            line-height: 1.5;
        }
        .user-message .bubble {
            background: linear-gradient(135deg, #2b5280, #1f4a7a);
            color: white;
            border-bottom-right-radius: 6px;
        }
        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="ai-container">
    <div class="nav-header">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-building-columns"></i></div>
            <span class="logo-text"></span>
        </div>
        <div class="avatar-icon" id="avatarIcon" title="个人中心"></div>
        <div class="avatar-menu" id="avatarMenu">
            <div class="menu-item" id="menuAgent"><i class="fas fa-robot"></i> Agent</div>
            <div class="menu-item" id="menuLog"><i class="fas fa-file-alt"></i> 日志管理</div>
            <div class="menu-item" id="menuPrompt"><i class="fas fa-tags"></i> 提示词管理</div>
        </div>
    </div>
    <div class="main-vertical">
        <div class="input-zone">
            <div class="greeting-area">
                <h2>您好，XXX <i class="far fa-smile-wink" style="color:#2e6a9e;"></i></h2>
            </div>
            <div class="mode-switch" id="modeSwitchContainer">
                <div class="mode-chip active" data-mode="chat"><i class="fas fa-comment-dots"></i> 聊天模式</div>
                <div class="mode-chip" data-mode="web"><i class="fas fa-globe"></i> 网页模式</div>
                <div class="mode-chip" data-mode="doc"><i class="fas fa-file-alt"></i> 文档模式</div>
                <div class="mode-chip" data-mode="ppt"><i class="fas fa-chalkboard"></i> PPT模式</div>
                <div class="mode-chip" data-mode="table"><i class="fas fa-table"></i> 表格模式</div>
                <div class="mode-chip" data-mode="product"><i class="fas fa-chart-line"></i> 产品模式</div>
            </div>
            <div class="ask-card">
                <div class="input-group">
                    <select id="assistantSelect" class="assistant-select">
                        <option value="smart-query">智能问数</option>
                        <option value="ai-employee">AI数字员工</option>
                        <option value="prompt-expert">Prompt专家</option>
                    </select>
                    <input type="text" id="questionInput" value="查询本周过生日的客户" placeholder="请输入您的问题...">
                    <button class="send-action" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="quick-hint" id="quickHintContainer">
                    <span class="quick-tag" data-quick="查询本周过生日的客户">🎂 本周生日</span>
                    <span class="quick-tag" data-quick="持仓规模超过1000万的客户">💰 持仓超1000万</span>
                    <span class="quick-tag" data-quick="风险等级分布">📊 风险分布</span>
                    <span class="quick-tag" data-quick="客户持仓总金额排名">🏆 持仓排名</span>
                    <span class="quick-tag" data-quick="赵司的总持仓是多少？固收和权益占比？">📌 赵司持仓</span>
                </div>
            </div>
        </div>
        <div class="bottom-space"></div>
    </div>
</div>
<div class="toast" id="toast"></div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 头像菜单
        const avatarIcon = document.getElementById('avatarIcon');
        const avatarMenu = document.getElementById('avatarMenu');
        avatarIcon.addEventListener('click', function(e) {
            e.stopPropagation();
            avatarMenu.classList.toggle('show');
        });
        document.addEventListener('click', function(e) {
            if (!avatarMenu.contains(e.target) && !avatarIcon.contains(e.target)) {
                avatarMenu.classList.remove('show');
            }
        });
        document.getElementById('menuAgent').addEventListener('click', function() {
            window.location.href = 'index.html';
        });
        document.getElementById('menuLog').addEventListener('click', function() {
            window.location.href = 'log.html';
        });
        document.getElementById('menuPrompt').addEventListener('click', function() {
            window.location.href = 'prompt.html';
        });

        // 模式切换
        document.querySelectorAll('.mode-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                document.querySelectorAll('.mode-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
            });
        });

        // 快捷标签
        document.querySelectorAll('.quick-tag').forEach(tag => {
            tag.addEventListener('click', function() {
                const quickText = tag.getAttribute('data-quick');
                document.getElementById('questionInput').value = quickText;
                sendMessage();
            });
        });

        // 发送按钮
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('questionInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
    });

    function sendMessage() {
        const question = document.getElementById('questionInput').value.trim();
        if (!question) return;
        const assistant = document.getElementById('assistantSelect').value;
        const url = `home.html?question=${encodeURIComponent(question)}&assistant=${encodeURIComponent(assistant)}`;
        window.location.href = url;
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }
</script>
</body>
</html>
