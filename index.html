<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>智能问数 | AI统一入口</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eef2f9 0%, #e0e8f2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        /* 主容器：上下结构 */
        .ai-container {
            width: 1200px;
            max-width: 100%;
            height: 860px;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部导航：Logo占位 + 头像图标（无文字） */
        .nav-header {
            padding: 16px 32px;
            background: white;
            border-bottom: 1px solid #eef2f9;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        /* Logo占位块（无文字，仅图形） */
        .logo-placeholder {
            width: 44px;
            height: 44px;
            background: linear-gradient(145deg, #0b2f4e, #1a4a76);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 22px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        /* 隐藏文字，仅保留Logo占位 */
        .logo-text {
            display: none;
        }
        .avatar-icon {
            width: 44px;
            height: 44px;
            background: #2b5280;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffffff"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>');
            background-size: 55%;
            background-position: center 55%;
            background-repeat: no-repeat;
            transition: transform 0.1s;
        }
        .avatar-icon:hover {
            transform: scale(1.02);
            background-color: #1f4870;
        }

        /* 上下核心布局：上部 1/3 用户输入区，下部 2/3 对话展示区 */
        .main-vertical {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            background: #fbfdff;
        }

        /* 上部 1/3 交互区域 (问候、模式切换、输入区) */
        .input-zone {
            height: 33.333%;
            background: #ffffff;
            border-bottom: 1px solid #ecf2f9;
            padding: 28px 32px 24px 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        /* 问候区域 - 只保留 "您好，XXX" */
        .greeting-area h2 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1a3f60;
            line-height: 1.2;
            margin-bottom: 0;
        }
        /* 去掉副标题描述 */
        .greeting-area p {
            display: none;
        }

        /* 模式切换 (6个模式: 聊天/网页/文档/PPT/表格/产品) */
        .mode-switch {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 4px 0 8px;
        }
        .mode-chip {
            background: #f0f5fc;
            border: 1px solid #e1ebf5;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2f608b;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .mode-chip i {
            font-size: 0.8rem;
        }
        .mode-chip.active {
            background: #1e4a78;
            border-color: #1e4a78;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .mode-chip:hover:not(.active) {
            background: #e6eff9;
            transform: translateY(-1px);
        }

        /* 智能问数核心卡片 */
        .ask-card {
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.02), 0 1px 3px rgba(0, 0, 0, 0.03);
            border: 1px solid #eef3fc;
            padding: 20px;
            margin-top: 6px;
        }
        .ask-label {
            font-weight: 600;
            color: #1e4670;
            margin-bottom: 16px;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .input-group {
            background: #f5f9fe;
            border-radius: 60px;
            border: 1px solid #dae6f2;
            display: flex;
            align-items: center;
            padding: 4px 4px 4px 20px;
            transition: all 0.2s;
        }
        .input-group:focus-within {
            border-color: #8fb4db;
            background: white;
            box-shadow: 0 0 0 3px rgba(26, 78, 122, 0.08);
        }
        .input-group input {
            flex: 1;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 0.9rem;
            outline: none;
            color: #1a2f44;
        }
        .input-group input::placeholder {
            color: #9bb8d4;
            font-weight: 400;
        }
        .send-action {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: #1a4e7a;
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        .send-action:hover {
            background: #0e3d62;
            transform: scale(0.96);
        }
        .quick-hint {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .quick-tag {
            background: #eef3fc;
            border-radius: 40px;
            padding: 5px 14px;
            font-size: 0.7rem;
            color: #326a96;
            cursor: pointer;
            transition: background 0.1s;
        }
        .quick-tag:hover {
            background: #e2ebf6;
        }

        /* 下部 2/3 对话展示区（初始完全留白，无任何预设气泡） */
        .conversation-area {
            height: 66.666%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-top: 1px solid #eff3fa;
        }
        /* 移除对话记录头部区域 */
        .chat-header {
            display: none;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px 28px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 消息气泡样式 (简洁留白) */
        .message-row {
            display: flex;
            gap: 12px;
            max-width: 80%;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .user-message {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .avatar-small {
            width: 32px;
            height: 32px;
            background: #eef2fc;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: #2b659b;
            font-size: 15px;
        }
        .bubble {
            background: white;
            padding: 10px 16px;
            border-radius: 22px;
            font-size: 0.85rem;
            line-height: 1.45;
            color: #1e2f3f;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            border: 1px solid #eef2f8;
        }
        .user-message .bubble {
            background: #1a4e7a;
            color: white;
            border: none;
        }
        .assistant-message .bubble {
            background: #ffffff;
            border: 1px solid #e9eff8;
        }
        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 8px 12px;
            align-items: center;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #9ab3d0;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 1.2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 60%, 100% { transform: scale(1); opacity: 0.6; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        /* 表格/图表辅助样式 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.75rem;
            margin: 8px 0;
        }
        .data-table th, .data-table td {
            padding: 6px 8px;
            text-align: left;
            border-bottom: 1px solid #e2eaf2;
        }
        .data-table th {
            background: #eef3fc;
            font-weight: 600;
        }
        .mini-bar {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .mini-bar-item {
            text-align: center;
            width: 60px;
        }
        .bar {
            width: 28px;
            background: #2d62a5;
            border-radius: 6px;
            margin: 0 auto 6px;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a6b;
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            z-index: 1000;
            animation: fadeOut 1.5s forwards;
            pointer-events: none;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f8;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbdbe0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="ai-container">
    <!-- 顶部导航：Logo占位（纯图形） + 头像图标 -->
    <div class="nav-header">
        <div class="logo-area">
            <div class="logo-placeholder"><i class="fas fa-building-columns"></i></div>
            <!-- 隐藏文字，仅占位Logo -->
            <span class="logo-text"></span>
        </div>
        <div class="avatar-icon" id="avatarIcon" title="个人中心"></div>
    </div>

    <!-- 上下结构：1/3 用户输入区 + 2/3 对话展示区（初始完全空白） -->
    <div class="main-vertical">
        <!-- 上部 1/3：问候（您好,XXX）、模式切换、输入组件 -->
        <div class="input-zone">
            <div class="greeting-area">
                <h2>您好，XXX <i class="far fa-smile-wink" style="color:#2e6a9e;"></i></h2>
                <!-- 已移除副标题描述 -->
            </div>

            <!-- 模式切换区（聊天、网页、文档、PPT、表格、产品 六个模式） -->
            <div class="mode-switch" id="modeSwitchContainer">
                <div class="mode-chip active" data-mode="chat"><i class="fas fa-comment-dots"></i> 聊天模式</div>
                <div class="mode-chip" data-mode="web"><i class="fas fa-globe"></i> 网页模式</div>
                <div class="mode-chip" data-mode="doc"><i class="fas fa-file-alt"></i> 文档模式</div>
                <div class="mode-chip" data-mode="ppt"><i class="fas fa-chalkboard"></i> PPT模式</div>
                <div class="mode-chip" data-mode="table"><i class="fas fa-table"></i> 表格模式</div>
                <div class="mode-chip" data-mode="product"><i class="fas fa-chart-line"></i> 产品模式</div>
            </div>

            <!-- 智能问数输入框 + 快捷指令 -->
            <div class="ask-card">
                <div class="input-group">
                    <i class="fas fa-robot" style="color:#1a4e7a; margin-right: 8px;"></i>
                    <input type="text" id="questionInput" placeholder="智能问数 - 例如：本周过生日的客户有哪些？">
                    <button class="send-action" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <div class="quick-hint" id="quickHintContainer">
                    <span class="quick-tag" data-quick="查询本周过生日的客户">🎂 本周生日</span>
                    <span class="quick-tag" data-quick="持仓规模超过1000万的客户">💰 持仓超1000万</span>
                    <span class="quick-tag" data-quick="风险等级分布">📊 风险分布</span>
                    <span class="quick-tag" data-quick="客户持仓总金额排名">🏆 持仓排名</span>
                    <span class="quick-tag" data-quick="赵司的总持仓是多少？固收和权益占比？">📌 赵司持仓</span>
                </div>
                <div style="margin-top: 12px; font-size: 11px; color:#8dabc9; text-align:center;">
                    <i class="far fa-keyboard"></i> Enter发送 · 数据智能解析
                </div>
            </div>
        </div>

        <!-- 下部 2/3 对话展示区（初始完全留白，无任何气泡或提示文字） -->
        <div class="conversation-area">
            <div class="chat-messages" id="chatMessages">
                <!-- 初始完全空白，不显示任何欢迎语或占位符 -->
            </div>
        </div>
    </div>
</div>

<script>
    // ---------- 智能问数核心函数（完整分析展示）----------
    function generateAnswer(question) {
        const lower = question.toLowerCase();
        if (lower.includes('本周过生日') || lower.includes('本周生日') || lower.includes('生日客户')) {
            return {
                type: 'table',
                title: '🎂 本周过生日的客户列表',
                columns: ['客户名称', '生日日期', '客户类型'],
                rows: [
                    ['陈敏', '2026-04-24', '自然人'],
                    ['刘振国', '2026-04-25', '机构'],
                    ['王雅君', '2026-04-27', '自然人'],
                    ['赵司', '2026-04-28', '高净值']
                ],
                summary: '共4位客户本周过生日，已为您整理清单。'
            };
        }
        if (lower.includes('持仓规模超过1000万') || lower.includes('持仓超过1000万') || lower.includes('高净值持仓')) {
            return {
                type: 'table',
                title: '💰 持仓规模超过1000万的客户',
                columns: ['客户名称', '持仓总规模(万元)', '产品数量'],
                rows: [
                    ['赵司', '1260', '4'],
                    ['林德福', '1520', '5'],
                    ['周裕华', '1100', '3']
                ],
                summary: '共3位客户持仓超千万，资产优质。'
            };
        }
        if (lower.includes('风险等级分布') || lower.includes('风险分布') || lower.includes('客户风险')) {
            return {
                type: 'pie',
                title: '📊 客户风险等级分布',
                data: { 'C1保守型': 8, 'C2稳健型': 24, 'C3平衡型': 35, 'C4进取型': 28, 'C5激进型': 15 },
                summary: 'C3及以上客户占比78%，风险偏好稳健偏进取。'
            };
        }
        if (lower.includes('客户持仓总金额排名') || lower.includes('持仓金额排名') || lower.includes('top持仓')) {
            return {
                type: 'bar',
                title: '🏆 客户持仓总金额排名 (万元)',
                labels: ['赵司', '林德福', '周裕华', '陈国富', '孙立人'],
                values: [1260, 1520, 1100, 980, 870],
                summary: '林德福客户持仓总金额最高，建议关注高净值维护。'
            };
        }
        if (lower.includes('赵司') && (lower.includes('总持仓') || lower.includes('固收') || lower.includes('权益'))) {
            return {
                type: 'text',
                title: '📌 赵司持仓分析',
                content: '✅ 赵司总持仓 ¥1,260 万，其中固收类 880 万 (69.8%)，权益类 380 万 (30.2%)。',
                summary: '资产配置以固收为主，稳健风格。'
            };
        }
        // 默认智能回复
        return {
            type: 'text',
            title: '🔍 智能问数分析',
            content: `根据现有数据，您咨询的「${question}」相关指标如下：当前信托产品整体表现稳健，近三月年化收益中枢在3.8%~4.5%之间。如需更精确明细，请提供具体业务维度(如产品代码/客户ID)。`,
            summary: '数据基于行业公开趋势模拟，仅供参考。'
        };
    }

    // 渲染答案到气泡
    function renderAnswerToDOM(answer, container) {
        container.innerHTML = ''; 
        const titleDiv = document.createElement('div');
        titleDiv.style.fontSize = '0.9rem';
        titleDiv.style.fontWeight = '600';
        titleDiv.style.marginBottom = '8px';
        titleDiv.style.color = '#1f4870';
        titleDiv.innerText = answer.title;
        container.appendChild(titleDiv);

        let contentWrapper = document.createElement('div');
        if (answer.type === 'table') {
            const table = document.createElement('table');
            table.className = 'data-table';
            const thead = document.createElement('thead');
            const headerRow = document.createElement('tr');
            answer.columns.forEach(col => {
                const th = document.createElement('th');
                th.innerText = col;
                headerRow.appendChild(th);
            });
            thead.appendChild(headerRow);
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            answer.rows.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.innerText = cell;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            contentWrapper.appendChild(table);
        } 
        else if (answer.type === 'pie') {
            const total = Object.values(answer.data).reduce((a,b) => a+b, 0);
            let colors = ['#2f69b0', '#487fc7', '#6190cf', '#7da3db', '#9bb9e8'];
            let gradientStops = [];
            let start = 0;
            const entries = Object.entries(answer.data);
            entries.forEach(([label, val], idx) => {
                let percent = (val / total) * 100;
                gradientStops.push(`${colors[idx % colors.length]} ${start}% ${start + percent}%`);
                start += percent;
            });
            const pieStyle = `width:100px; height:100px; border-radius:50%; background:conic-gradient(${gradientStops.join(',')});`;
            const legendHtml = entries.map(([k,v]) => `<div style="display:flex; align-items:center; gap:6px; margin-bottom:4px;"><span style="display:inline-block; width:10px; height:10px; background:${colors.shift()}; border-radius:2px;"></span><span style="font-size:11px;">${k}: ${v}人 (${((v/total)*100).toFixed(1)}%)</span></div>`).join('');
            contentWrapper.innerHTML = `<div style="display:flex; gap:16px; align-items:center; flex-wrap:wrap;"><div style="${pieStyle}"></div><div>${legendHtml}</div></div>`;
        } 
        else if (answer.type === 'bar') {
            const maxVal = Math.max(...answer.values);
            const barHtml = `<div class="mini-bar">${answer.labels.map((l, i) => `
                <div class="mini-bar-item">
                    <div class="bar" style="height:${Math.max(24, (answer.values[i]/maxVal)*55)}px;"></div>
                    <div style="font-size:10px; font-weight:600;">${answer.values[i]}w</div>
                    <div style="font-size:9px;">${l}</div>
                </div>
            `).join('')}</div>`;
            contentWrapper.innerHTML = barHtml;
        } 
        else {
            const textDiv = document.createElement('div');
            textDiv.style.padding = '4px 0';
            textDiv.style.lineHeight = '1.5';
            textDiv.innerText = answer.content;
            contentWrapper.appendChild(textDiv);
        }
        container.appendChild(contentWrapper);
        const summaryDiv = document.createElement('div');
        summaryDiv.style.fontSize = '0.65rem';
        summaryDiv.style.color = '#7997b9';
        summaryDiv.style.marginTop = '10px';
        summaryDiv.style.borderTop = '1px solid #eef2f9';
        summaryDiv.style.paddingTop = '8px';
        summaryDiv.innerText = `📎 ${answer.summary}  |  智能问数 · 实时解析`;
        container.appendChild(summaryDiv);
    }

    function showTyping(container) {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.innerHTML = '<span></span><span></span><span></span><span style="margin-left:6px; font-size:11px;">智能问数分析中...</span>';
        container.appendChild(typingDiv);
        return typingDiv;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function addUserMessage(question) {
        const messagesDiv = document.getElementById('chatMessages');
        const userMsgDiv = document.createElement('div');
        userMsgDiv.className = 'message-row user-message';
        userMsgDiv.innerHTML = `
            <div class="avatar-small"><i class="fas fa-user-circle"></i></div>
            <div class="bubble">${escapeHtml(question)}</div>
        `;
        messagesDiv.appendChild(userMsgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function addAssistantResponse(question) {
        const messagesDiv = document.getElementById('chatMessages');
        const assistantWrap = document.createElement('div');
        assistantWrap.className = 'message-row assistant-message';
        assistantWrap.innerHTML = `<div class="avatar-small"><i class="fas fa-brain"></i></div><div class="bubble" id="tempAssistantBubble"></div>`;
        messagesDiv.appendChild(assistantWrap);
        const bubbleDiv = assistantWrap.querySelector('.bubble');
        const thinkingElem = showTyping(bubbleDiv);
        await new Promise(resolve => setTimeout(resolve, 500));
        const answer = generateAnswer(question);
        bubbleDiv.innerHTML = '';
        const answerContainer = document.createElement('div');
        answerContainer.style.width = '100%';
        renderAnswerToDOM(answer, answerContainer);
        bubbleDiv.appendChild(answerContainer);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    async function sendMessage() {
        const input = document.getElementById('questionInput');
        const question = input.value.trim();
        if (!question) return;
        input.value = '';
        const encodedQuestion = encodeURIComponent(question);
        window.location.href = `home.html?question=${encodedQuestion}`;
    }

    // 模式切换（视觉反馈 + toast）
    let currentMode = 'chat';
    const modeChips = document.querySelectorAll('.mode-chip');
    function setMode(mode) {
        currentMode = mode;
        modeChips.forEach(chip => {
            const chipMode = chip.getAttribute('data-mode');
            if (chipMode === mode) chip.classList.add('active');
            else chip.classList.remove('active');
        });
        showToast(`已切换至「${mode}」模式，智能问数将优先以该方式呈现数据`);
    }
    function showToast(msg) {
        let toast = document.createElement('div');
        toast.className = 'toast-msg';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1600);
    }
    modeChips.forEach(chip => {
        chip.addEventListener('click', () => {
            const mode = chip.getAttribute('data-mode');
            if (mode) setMode(mode);
        });
    });

    // 快捷标签绑定
    document.querySelectorAll('.quick-tag').forEach(tag => {
        tag.addEventListener('click', (e) => {
            const question = tag.getAttribute('data-quick');
            if (question) {
                document.getElementById('questionInput').value = question;
                sendMessage();
            }
        });
    });

    // 发送按钮与键盘事件
    const sendBtn = document.getElementById('sendBtn');
    const questionInputDom = document.getElementById('questionInput');
    sendBtn.addEventListener('click', sendMessage);
    questionInputDom.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // 头像点击轻提示
    const avatar = document.getElementById('avatarIcon');
    avatar.addEventListener('click', () => {
        showToast('个人中心');
    });
</script>
</body>
</html>
